name: Build

on:
  push:
    branches:
      - main
      - development
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore solution
        run: dotnet restore StarterApp.sln

      - name: Build StarterApp.Database
        run: dotnet build StarterApp.Database/StarterApp.Database.csproj -c Release --no-restore

      - name: Build StarterApp.Migrations
        run: dotnet build StarterApp.Migrations/StarterApp.Migrations.csproj -c Release --no-restore

      - name: Build StarterApp Android
        run: dotnet build StarterApp/StarterApp.csproj -c Release -f net10.0-android --no-restore

      - name: Test with coverage
        run: dotnet test StarterApp.Tests/StarterApp.Tests.csproj -c Release --no-restore --collect:"XPlat Code Coverage"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: code-coverage
          path: StarterApp.Tests/TestResults/**/*.xml